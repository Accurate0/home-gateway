name: Branch build eink-display-firmware
on:
  workflow_dispatch:
  pull_request:
    paths:
      - eink-display-firmware/**
      - .forgejo/workflows/branch-build-eink-display-firmware.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          buildtargets: esp32s3
          ldproxy: true
      - name: Build
        run: cargo build --release
        working-directory: eink-display-firmware
