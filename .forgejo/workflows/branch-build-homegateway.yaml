name: Branch build HomeGateway
on:
  workflow_dispatch:
  pull_request:
    paths:
      - HomeGateway/**
      - .forgejo/workflows/branch-build-homegateway.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Mock secrets file
        run: cp local.defaults.properties secrets.properties
        working-directory: HomeGateway
      - name: Build
        run: ./gradlew assembleDebug
        working-directory: HomeGateway
