name: Branch build eink-display-firmware

on:
  workflow_dispatch:
  pull_request:
    paths:
      - eink-display-firmware/**
      - .github/workflows/branch-build-eink-display-firmware.yml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: esp-rs/xtensa-toolchain@ec6d36527049a7f4fb2cb0c1a644668c1bb8a2a4 # v1.7
        with:
          buildtargets: esp32s3
          ldproxy: true
      - name: Build
        run: cargo build --release
        working-directory: eink-display-firmware
