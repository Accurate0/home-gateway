name: Branch build eink-display-web

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - eink-display-web/**
      - .github/workflows/branch-build-eink-display-web.yml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.17.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "23"
          cache: "pnpm"
          cache-dependency-path: eink-display-web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: eink-display-web
      - name: Build
        run: pnpm run build
        working-directory: eink-display-web
        env:
          VITE_GRAPHQL_API_KEY: "testing"
