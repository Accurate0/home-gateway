name: Branch build HomeGateway

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "HomeGateway/**"
      - ".github/workflows/branch-build-homegateway.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
      - name: Mock secrets file
        run: cp local.defaults.properties secrets.properties
        working-directory: HomeGateway
      - name: Build
        run: ./gradlew assembleDebug
        working-directory: HomeGateway
