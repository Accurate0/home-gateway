name: Deploy
on:
  push:
    branches:
      - main
    paths-ignore:
      - eink-display-web/**
      - eink-display-firmware/**
      - HomeGateway/**
  workflow_dispatch:

jobs:
  build-selfbot:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@main
    with:
      directory: selfbot
      image-name: home-selfbot
      docker-build-args: ""
      use-rust-caching: false

  build:
    permissions:
      packages: write

    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx

      - name: Docker build
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ghcr.io/accurate0/home-gateway:latest,ghcr.io/accurate0/home-gateway:${{ github.sha }}
          build-args: |
            BINARY_NAME=home-gateway
            HOME_GATEWAY_API_SECRET=${{ secrets.HOME_GATEWAY_API_SECRET }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

  deploy:
    needs:
      - build
      - build-selfbot
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@main
    with:
      service-name: home-gateway
      images: ghcr.io/accurate0/home-gateway,ghcr.io/accurate0/home-selfbot
      manifests-path: projects/home-gateway/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
