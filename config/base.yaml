version: "1"

s3:
  bucket: home-gateway-bucket
  region: ap-southeast-2

notify_targets:
  android_app:
    type: android_app

fcm_project_id: home-gateway-22

location:
  latitude: -31.952429
  longitude: 115.842283

watchdog:
  enabled: false
  timeout: 30m
  check_interval: 5m
  realert_after: 6h

oauth:
  issuer: https://idm.anurag.sh/oauth2/openid/home-gateway
  jwks_url: https://idm.anurag.sh/oauth2/openid/home-gateway/public_key.jwk
  userinfo_url: https://idm.anurag.sh/oauth2/openid/home-gateway/userinfo
  audience: home-gateway
  group_scopes:
    home_gateway_admins@idm.anurag.sh: ["*"]
    home_gateway_readers@idm.anurag.sh: ["graphql:*:read", "rest:epd:read"]

api_keys:
  - name: eink-display-living-room
    scopes: ["rest:epd:read"]
  - name: unifi-ingest
    scopes: ["ingest:unifi:write"]
  - name: home-gateway-app
    scopes: ["*"]

eink_display:
  refresh: 1h
  settle: 10s
  s3_key: eink-display-screenshot.png

woolworths:
  refresh: 1h

alarm:
  poll_interval: 60s

home_assistant:
  entities:
    - id: sensor.apollo_mtr_1_living_room_target_*
      log: false
      throttle: 30s

devices: !include devices.yaml
workflows: !include workflows/index.yaml
