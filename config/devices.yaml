- id: front-door
  transport: zigbee
  address: "0x54ef441000d2b0b0"
  watchdog:
    timeout: 1h
    notify: [android_app]
  kinds:
    - kind: door
      config:
        name: Front Door
        id: front-door
        state: armed
        timeout: 3m
        notify: [android_app]

- id: garage-door
  transport: zigbee
  address: "0x54ef441000d2b1ba"
  kinds:
    - kind: door
      config:
        name: Garage Door
        id: garage-door
        state: unarmed
        notify: [android_app]

- id: washing-machine
  transport: zigbee
  address: "0xa4c1389fe5cea26e"
  kinds:
    - kind: appliance
      config:
        name: Washing Machine
        id: washing-machine
        current: { threshold: 0.05 }
        notify: [android_app]

- id: env-living-room
  transport: zigbee
  address: "0x00158d008b8798a7"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: living-room, name: Living Room }

- id: env-bathroom
  transport: zigbee
  address: "0x00158d008b879b53"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: bathroom, name: Bathroom }

- id: env-bedroom
  transport: zigbee
  address: "0xb0c7defffef6a9be"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: bedroom, name: Bedroom }

- id: env-outdoor
  transport: zigbee
  address: "0x54ef441000ee2ca3"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: outdoor, name: Outdoor }

- id: livingroom-motion
  transport: esphome
  address: apollo-mtr-1-livingroom
  capabilities: [temperature, pressure]
  kinds:
    - kind: presence
      config:
        name: Living Room Motion
        motion_entity: [ld2450_presence, ld2450_moving_target, ld2450_still_target]
    - kind: environment
      config:
        id: living-room-mtr-1
        name: Living Room
        entities:
          temperature: dps310_temperature
          pressure: dps310_pressure

- id: closet-presence
  transport: zigbee
  address: "0x54ef441000dbc81c"
  kinds:
    - kind: presence
      config: { name: Closet Presence Sensor }

- id: hallway-plant
  transport: esphome
  address: apollo-plt-1-hallway
  capabilities: [temperature, humidity, lux, uv_index]
  kinds:
    - kind: environment
      config:
        id: hallway-plant
        name: Hallway Plant
        entities:
          temperature: air_temperature
          humidity: air_humidity
          lux: ltr390_light
          uv_index: ltr390_uv_index
    - kind: plant
      config: { id: hallway-plant, entities: [soil_moisture] }

- id: closet-light
  transport: zigbee
  address: "0x54ef441000d4f05c"
  capabilities: [colour_temp]
  kinds:
    - kind: light
      config: { name: Closet Light }

- id: table-lamp-bedroom
  transport: zigbee
  address: "0x001788010381ef5d"
  capabilities: [colour_temp, rgb]
  kinds:
    - kind: light
      config: { name: Bedroom Table Lamp }

- id: floor-lamp-living-room
  transport: zigbee
  address: "0x94a081fffe2eedc0"
  capabilities: [colour_temp]
  kinds:
    - kind: light
      config: { name: Living Room Floor Lamp }

- id: control-switch
  transport: zigbee
  address: "0x64028ffffe638218"
  kinds:
    - kind: control_switch

- id: small-switch
  transport: zigbee
  address: "0x00158d008bbe0316"
  kinds:
    - kind: control_switch
