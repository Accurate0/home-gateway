- id: front-door
  room: entry
  transport: zigbee
  address: "0x54ef441000d2b0b0"
  watchdog:
    timeout: 1h
    notify: [android_app]
  kinds:
    - kind: door
      config:
        name: Front Door
        id: front-door
        state: armed
        timeout: 3m
        notify: [android_app]

- id: garage-door
  room: garage
  transport: zigbee
  address: "0x54ef441000d2b1ba"
  kinds:
    - kind: door
      config:
        name: Garage Door
        id: garage-door
        state: unarmed
        notify: [android_app]

- id: living-room-table-lamp
  room: living-room
  transport: zigbee
  address: "0xa4c1389fe5cea26e"
  kinds:
    - kind: smart_switch
      config:
        name: Living Room Table Lamp
        as: light

- id: env-living-room
  room: living-room
  transport: zigbee
  address: "0x00158d008b8798a7"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: living-room, name: Living Room }

- id: env-bathroom
  room: bathroom
  transport: zigbee
  address: "0x00158d008b879b53"
  capabilities: [temperature, humidity, pressure]
  kinds:
    - kind: environment
      config: { id: bathroom, name: Bathroom }

- id: env-bedroom
  room: bedroom
