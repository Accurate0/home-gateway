- name: Living room motion on
  on: { type: presence, sensor: livingroom_motion, present: true }
  run:
    - type: light
      device: non_existent_light
      state: ON

- name: Living room motion off
  on: { type: presence, sensor: livingroom_motion, present: false }
  run:
    - type: light
      device: non_existent_light
      state: OFF
