substitutions:
  name: apollo-mtr-1
  version: "26.3.2.1"
  device_description: ${name} made by Apollo Automation - version ${version}.

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

web_server:
  port: 80
  version: 3

mqtt:
  broker: 10.0.1.208

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  actions:
    - action: play_buzzer
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda "return song_str;"

    #Co2 Calibration Action
    - action: calibrate_co2_value
      variables:
        co2_ppm: float
      then:
        - scd4x.perform_forced_calibration:
            value: !lambda "return co2_ppm;"
            id: scd40

globals:
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: "0"
  - id: runTest
    restore_value: yes
    type: bool
    initial_value: "true"
  - id: testCycleCount
    type: int
    restore_value: no
    initial_value: "0"
  - id: dps310Passed
    restore_value: no
    type: bool
    initial_value: "false"
  - id: ltr390lightPassed
    restore_value: no
    type: bool
    initial_value: "false"
  - id: ltr390uvindexPassed
    restore_value: no
    type: bool
    initial_value: "false"
  - id: ld2450Passed
    restore_value: no
    type: bool
    initial_value: "false"
  - id: ltr390_last_update
    restore_value: no
    type: uint32_t
    initial_value: "0"

i2c:
  sda: GPIO1
  scl: GPIO0
  id: bus_a

uart:
  id: uart_bus
  tx_pin:
    number: GPIO21
    mode:
      input: true
      pullup: true
  rx_pin:
    number: GPIO20
    mode:
      input: true
      pullup: true
  rx_buffer_size: 1024
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_bus

number:
  - platform: ld2450
    ld2450_id: ld2450_radar
    presence_timeout:
      name: "Timeout"
    zone_1:
      x1:
        name: Zone-1 X1
      y1:
        name: Zone-1 Y1
      x2:
        name: Zone-1 X2
      y2:
        name: Zone-1 Y2
    zone_2:
      x1:
        name: Zone-2 X1
      y1:
        name: Zone-2 Y1
      x2:
        name: Zone-2 X2
      y2:
        name: Zone-2 Y2
    zone_3:
      x1:
        name: Zone-3 X1
      y1:
        name: Zone-3 Y1
      x2:
        name: Zone-3 X2
      y2:
        name: Zone-3 Y2
  - platform: template
    name: "DPS310 Pressure Offset"
    id: dps310_pressure_offset
    disabled_by_default: true
    restore_value: true
    initial_value: 0.0
    min_value: -100.0
    max_value: 100.0
    entity_category: "CONFIG"
    unit_of_measurement: "hPa"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box

  - platform: template
    name: DPS310 Temperature Offset
    id: dps310_temperature_offset
    restore_value: true
    initial_value: 18.86
    min_value: -70.0
    max_value: 70.0
    entity_category: "CONFIG"
    unit_of_measurement: "°C"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box
  - platform: template
    name: SCD40 Temperature Offset
    id: scd40_temperature_offset
    restore_value: true
    initial_value: 18.86
    min_value: -70.0
    max_value: 70.0
    entity_category: "CONFIG"
    unit_of_measurement: "°C"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box
    disabled_by_default: true
  - platform: template
    name: SCD40 Humidity Offset
    id: scd40_humidity_offset
    restore_value: true
    initial_value: 0
    min_value: -70.0
    max_value: 70.0
    entity_category: "CONFIG"
    unit_of_measurement: "%"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box
    disabled_by_default: true
  - platform: template
    name: LTR390 Update Interval
    id: ltr390_update_interval
    restore_value: true
    initial_value: 60
    min_value: 1
    max_value: 300
    entity_category: "CONFIG"
    unit_of_measurement: "s"
    optimistic: true
    update_interval: never
    step: 1
    mode: box

output:
  - platform: ledc
    pin: GPIO10
    id: buzzer
rtttl:
  output: buzzer

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      id: ld2450_presence
      name: "LD2450 Presence"
    has_moving_target:
      id: ld2450_moving_target
      name: "LD2450 Moving Target"
    has_still_target:
      id: ld2450_still_target
      name: "LD2450 Still Target"

  - platform: status
    name: Online
    id: ink_ha_connected

  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true
    id: reset_button
    on_press:
      then:
        - lambda: |-
            id(button_press_timestamp) = millis();

    on_release:
      then:
        - lambda: |-
            if (millis() - id(button_press_timestamp) >= 8000) {
              id(factory_reset_switch).turn_on();
            }
            else if (millis() - id(button_press_timestamp) >= 1000) {
              id(testCycleCount) = 0;
              id(runTest) = true;
              id(testScript).execute();
            }

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

  - platform: wifi_signal
    name: RSSI
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: scd4x
    id: scd40
    co2:
      name: "CO2"
      id: "co2"
    temperature:
      name: "SCD40 Temperature"
      id: scd40_temperature
      disabled_by_default: true
      filters:
        - lambda: return x - id(scd40_temperature_offset).state;
    humidity:
      name: "SCD40 Humidity"
      id: scd40_humidity
      disabled_by_default: true
      filters:
        - lambda: return x - id(scd40_humidity_offset).state;
    automatic_self_calibration: false
    update_interval: 60s
    measurement_mode: "periodic"
    i2c_id: bus_a
    ambient_pressure_compensation_source: dps310pressure

  - platform: dps310
    id: dps_310
    pressure:
      name: "DPS310 Pressure"
      id: dps310pressure
      filters:
        - lambda: |-
            float offset = id(dps310_pressure_offset).state;
            return isnan(offset) ? x : x + offset;
    temperature:
      name: "DPS310 Temperature"
      id: dps310temperature
      filters:
        - lambda: return x - id(dps310_temperature_offset).state;
    update_interval: 30s
    i2c_id: bus_a

  - platform: ltr390
    id: ltr_390
    update_interval: never
    light:
      name: "LTR390 Light"
      id: ltr390light
    uv_index:
      name: "LTR390 UV Index"
      id: ltr390uvindex

  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: Presence Target Count
      id: presence_target_count
    still_target_count:
      name: Still Target Count
    moving_target_count:
      name: Moving Target Count
    target_1:
      x:
        name: Target-1 X
      y:
        name: Target-1 Y
      speed:
        name: Target-1 Speed
      angle:
        name: Target-1 Angle
      distance:
        name: Target-1 Distance
      resolution:
        name: Target-1 Resolution
    target_2:
      x:
        name: Target-2 X
      y:
        name: Target-2 Y
      speed:
        name: Target-2 Speed
      angle:
        name: Target-2 Angle
      distance:
        name: Target-2 Distance
      resolution:
        name: Target-2 Resolution
    target_3:
      x:
        name: Target-3 X
      y:
        name: Target-3 Y
      speed:
        name: Target-3 Speed
      angle:
        name: Target-3 Angle
      distance:
        name: Target-3 Distance
      resolution:
        name: Target-3 Resolution
    zone_1:
      target_count:
        name: Zone-1 All Target Count
      still_target_count:
        name: Zone-1 Still Target Count
      moving_target_count:
        name: Zone-1 Moving Target Count
    zone_2:
      target_count:
        name: Zone-2 All Target Count
      still_target_count:
        name: Zone-2 Still Target Count
      moving_target_count:
        name: Zone-2 Moving Target Count
    zone_3:
      target_count:
        name: Zone-3 All Target Count
      still_target_count:
        name: Zone-3 Still Target Count
      moving_target_count:
        name: Zone-3 Moving Target Count

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO3
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

button:
  - platform: ld2450
    ld2450_id: ld2450_radar
    factory_reset:
      name: "Factory Reset LD2450"
      disabled_by_default: True

  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"

  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all
  - platform: template
    name: "Calibrate SCD40 To 420ppm"
    id: set_SCD40_calibrate
    on_press:
      - scd4x.perform_forced_calibration:
          value: 420
          id: scd40

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint32_t current_time = millis() / 1000;  // Convert to seconds
          uint32_t last_update = id(ltr390_last_update);
          float configured_interval = id(ltr390_update_interval).state;
          uint32_t interval = (configured_interval >= 1.0f) ? (uint32_t)configured_interval : 60u;

          // Immediate update on boot (when last_update is still 0)
          if (last_update == 0) {
            id(ltr_390).update();
            id(ltr390_last_update) = current_time;
            return;
          }

          // Check if enough time has passed
          if (current_time - last_update >= interval) {
            id(ltr_390).update();
            id(ltr390_last_update) = current_time;
          }

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true
  - platform: ld2450
    ld2450_id: ld2450_radar
    bluetooth:
      name: "LD2450 Bluetooth"
    multi_target:
      name: "Multi Target Tracking"
select:
  - platform: ld2450
    ld2450_id: ld2450_radar
    baud_rate:
      name: "Baud rate"
      disabled_by_default: true
    zone_type:
      name: "Zone Type"

text_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    version:
      name: "LD2450 Firmware"
    mac_address:
      name: "LD2450 BT MAC"
    target_1:
      direction:
        name: "Target-1 Direction"
    target_2:
      direction:
        name: "Target-2 Direction"
    target_3:
      direction:
        name: "Target-3 Direction"
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: "diagnostic"
  - platform: template
    name: "Apollo Firmware Version"
    id: apollo_firmware_version
    update_interval: never
    entity_category: "diagnostic"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      entity_category: "diagnostic"

script:
  - id: testScript
    then:
      if:
        condition:
          - lambda: "return id(runTest) == true;"
        then:
          - lambda: "id(runTest) = false;"
          - lambda: "id(testCycleCount) = 0;"
          - while:
              condition:
                - lambda: "return id(testCycleCount) < 5;"
              then:
                - if:
                    condition:
                      - lambda: "return id(dps310Passed) == false;"
                    then:
                      - if:
                          condition:
                            - lambda: "return id(dps310pressure).state > 0;"
                          then:
                            - lambda: "id(dps310Passed) = true;"
                - if:
                    condition:
                      - lambda: "return id(ltr390lightPassed) == false;"
                    then:
                      - if:
                          condition:
                            - lambda: "return id(ltr390light).state > 10;"
                          then:
                            - lambda: "id(ltr390lightPassed) = true;"
                - if:
                    condition:
                      - lambda: "return id(ltr390uvindexPassed) == false;"
                    then:
                      - if:
                          condition:
                            - lambda: "return !isnan(id(ltr390uvindex).state);"
                          then:
                            - lambda: "id(ltr390uvindexPassed) = true;"
                - if:
                    condition:
                      - lambda: "return id(ld2450Passed) == false;"
                    then:
                      - if:
                          condition:
                            - lambda: "return id(presence_target_count).state > 0;"
                          then:
                            - lambda: "id(ld2450Passed) = true;"
                - if:
                    condition:
                      - lambda: "return id(dps310Passed) && id(ltr390lightPassed) && id(ltr390uvindexPassed) && id(ld2450Passed);"
                    then:
                      - lambda: "id(testCycleCount) = 10;"
                - lambda: "id(runTest) = false;"
                - delay: 1s
                - lambda: "id(testCycleCount) += 1;"

          #Check If Test Passed To Trigger Lights
          - if:
              condition:
                - lambda: "return id(dps310Passed) && id(ltr390lightPassed) && id(ltr390uvindexPassed) && id(ld2450Passed);"
              then:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light

              else:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light
