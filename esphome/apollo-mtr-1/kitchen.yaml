esphome:
  name: "${name}-kitchen"
  friendly_name: Apollo MTR-1 Kitchen
  comment: Apollo MTR-1 Kitchen
  name_add_mac_suffix: false

  project:
    name: "ApolloAutomation.MTR-1"
    version: "${version}"

  min_version: 2025.8.0
  on_boot:
    - priority: 500
      then:
        - text_sensor.template.publish:
            id: apollo_firmware_version
            state: "${version}"
    - priority: -10
      then:
        - if:
            condition:
              - lambda: "return id(runTest);"
            then:
              - lambda: "id(testScript).execute();"

dashboard_import:
  package_import_url: github://ApolloAutomation/MTR-1/Integrations/ESPHome/MTR-1_Factory.yaml
  import_full_config: false

improv_serial:

esp32_improv:
  authorizer: none

logger:

ota:
  - platform: esphome
    id: ota_esphome

packages:
  core: !include core.yaml
