# SPA served by nginx-unprivileged (listens on 8080). The HTTPRoute sends only
# non-/v1 paths here, so every request is a client-side route: fall back to
# index.html (e.g. the OAuth /callback path).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
