type QueryRoot {
	auth: AuthObject!
	events(input: EventsInput!): EventsObject!
	environment: EnvironmentObject!
	"""
	Every configured entity and its current state. Entity types the caller
	lacks a `graphql:<type>:read` scope for are silently omitted — this query
	never errors on missing permissions.
	"""
	entities: [Entity!]!
	solar: SolarObject!
	energy: EnergyObject!
	weather(input: WeatherInput!): WeatherObject!
	woolworths: WoolworthsObject!
}

type SolarCurrentResponse {
	currentProductionWh: Float!
	todayProductionKwh: Float!
	yesterdayProductionKwh: Float!
	monthProductionKwh: Float!
	allTimeProductionKwh: Float!
	statistics: SolarCurrentStatistics!
	uvLevel: Float
	temperature: Float
}

type SolarCurrentStatistics {
	averages: SolarCurrentStatisticsAverages!
}

type SolarCurrentStatisticsAverages {
	last15Mins: Float
	last1Hour: Float
	last3Hours: Float
}

input SolarHistoryInput {
	since: DateTime!
}

type SolarObject {
	current: SolarCurrentResponse!
	history(input: SolarHistoryInput!): [GenerationHistory!]!
}

type SubscriptionRoot {
	events(filter: String! = "*"): EventUpdate!
}

type SwitchUpdate {
	eventId: UUID!
	device: String!
	action: String!
}

"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique Identifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID

