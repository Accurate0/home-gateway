	humidity: Float
	pressure: Float
	lux: Float
	uvIndex: Float
	time: DateTime!
	name: String!
}

type EnvironmentEntity {
	id: String!
	name: String!
	"""
	Nullable so a missing reading reports the error against this field
	without nulling the whole entity.
	"""
	temperature: Float
	humidity: Float
	pressure: Float
	lux: Float
	uvIndex: Float
	"""
	Nullable so a missing reading reports the error against this field
	without nulling the whole entity.
	"""
	time: DateTime
}

type EnvironmentObject {
	"""
	Every environment sensor in the device registry, so new sensors appear
	without code changes.
	"""
	sensors: [EnvironmentDetails!]!
	"""
	Look up a single environment sensor by its configured id (e.g. `outdoor`).
	"""
	byId(id: String!): EnvironmentDetails!
	outdoor: EnvironmentDetails! @deprecated(reason: "Use `sensors` (config-driven) or `byId` instead")
	laundry: EnvironmentDetails! @deprecated(reason: "Use `sensors` (config-driven) or `byId` instead")
	livingRoom: EnvironmentDetails! @deprecated(reason: "Use `sensors` (config-driven) or `byId` instead")
	bathroom: EnvironmentDetails! @deprecated(reason: "Use `sensors` (config-driven) or `byId` instead")
	bedroom: EnvironmentDetails! @deprecated(reason: "Use `sensors` (config-driven) or `byId` instead")
}

